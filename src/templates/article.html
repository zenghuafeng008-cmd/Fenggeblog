<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="follow, index, max-snippet:-1, max-video-preview:-1, max-image-preview:large"/>
    <link rel="canonical" href="{{canonical_url}}"/>
    
    <title>{{title}} - 凤鸽博客</title>
    <meta name="description" content="{{description}}"/>
    
    <!-- Open Graph -->
    <meta property="og:locale" content="zh_CN"/>
    <meta property="og:type" content="article"/>
    <meta property="og:title" content="{{title}}"/>
    <meta property="og:description" content="{{description}}"/>
    <meta property="og:url" content="{{url}}"/>
    <meta property="og:site_name" content="凤鸽博客"/>
    <meta property="og:updated_time" content="{{updated_time}}"/>
    <meta property="og:image" content="{{og_image}}"/>
    <meta property="article:published_time" content="{{published_time}}"/>
    <meta property="article:modified_time" content="{{modified_time}}"/>
    <meta property="article:section" content="{{category}}"/>
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="{{title}}"/>
    <meta name="twitter:description" content="{{description}}"/>
    <meta name="twitter:label1" content="Written by"/>
    <meta name="twitter:data1" content="{{author}}"/>
    <meta name="twitter:label2" content="Time to read"/>
    <meta name="twitter:data2" content="{{reading_time}}"/>
    
    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": "{{title}}",
        "datePublished": "{{published_time}}",
        "dateModified": "{{modified_time}}",
        "articleSection": "{{category}}",
        "author": {"@type": "Person", "name": "{{author}}"},
        "publisher": {"@type": "Organization", "name": "凤鸽博客", "url": "https://0746.qzz.cn"},
        "description": "{{description}}",
        "inLanguage": "zh-Hans",
        "mainEntityOfPage": {"@type": "WebPage", "@id": "{{url}}"}
    }
    </script>
    
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Breadcrumb -->
    <nav class="breadcrumb">
        <div class="breadcrumb-inner">
            <a href="/">首页</a>
            <span class="separator">›</span>
            <a href="/articles.html">文章</a>
            <span class="separator">›</span>
            <a href="/articles.html?category={{cat_slug}}">{{category}}</a>
            <span class="separator">›</span>
            <span class="current">{{title}}</span>
        </div>
    </nav>
    
    <article class="article-container">
        <header class="article-header">
            <h1 class="article-title">{{title}}</h1>
            <div class="article-meta">
                <span class="category-tag">{{category}}</span>
                <span>👤 {{author}}</span>
                <span>📅 {{publish_date}}</span>
                <span>⏱️ {{reading_time}}</span>
            </div>
            <div class="article-source">来源：<a href="{{source_url}}" target="_blank">{{source_name}}</a></div>
        </header>
        
        <!-- Table of Contents -->
        <nav class="toc" id="toc">
            <div class="toc-title">📑 文章目录</div>
            <ol>{{toc_items}}</ol>
        </nav>
        
        <!-- Article Body -->
        <div class="article-body">
            {{content}}
        </div>
        
        <!-- Article Footer -->
        <footer class="article-footer">
            <div class="article-tags">
                <span class="tag-label">标签：</span>
                <span class="article-tag">{{category}}</span>
            </div>
            
            <!-- Share Bar -->
            <div class="share-bar">
                <span>分享到：</span>
                <button class="share-btn wx" onclick="alert(\'请截图分享到微信\')">微信</button>
                <button class="share-btn wb" onclick="window.open(\'https://service.weibo.com/share/share.php?url=\'+encodeURIComponent(location.href),\'_blank\')">微博</button>
                <button class="share-btn" onclick="navigator.clipboard.writeText(location.href).then(()=>alert(\'链接已复制\'))">复制链接</button>
            </div>
            
            <!-- Navigation -->
            <nav class="article-nav">
                <a href="{{prev_url}}" class="nav-link prev {{no_prev}}">
                    <span>← 上一篇</span>
                    <span class="nav-title">{{prev_title}}</span>
                </a>
                <a href="{{next_url}}" class="nav-link next {{no_next}}">
                    <span>下一篇 →</span>
                    <span class="nav-title">{{next_title}}</span>
                </a>
            </nav>
            
            <!-- Related Articles -->
            <section class="related-articles">
                <h3>📌 相关推荐</h3>
                <ul>
                    {{related_articles}}
                </ul>
            </section>
            
            <a href="/articles.html" class="back-link">← 返回文章列表</a>
            <br><br>
            <a href="/" class="back-link">← 返回首页</a>
        </footer>
    </article>
    
    <script>
    document.addEventListener(\'DOMContentLoaded\', function() {
        // 如果目录少于2项，隐藏目录
        const toc = document.getElementById(\'toc\');
        const tocItems = toc.querySelectorAll(\'li\');
        if (tocItems.length < 2) {
            toc.style.display = \'none\';
        }
        
        // 滚动时高亮目录
        const headings = document.querySelectorAll(\'.article-body h2[id]\');
        const tocLinks = document.querySelectorAll(\'.toc a\');
        
        window.addEventListener(\'scroll\', function() {
            let current = \'\';
            headings.forEach(h => {
                if (h.getBoundingClientRect().top < 100) {
                    current = h.id;
                }
            });
            tocLinks.forEach(link => {
                link.classList.remove(\'active\');
                if (link.getAttribute(\'href\') === \'#\' + current) {
                    link.classList.add(\'active\');
                }
            });
        });
    });
    </script>
</body>
</html>

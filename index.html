<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

<body>
    <header class="site-header">

    <script>
    fetch("/articles/stats.json").then(r=>r.json()).then(function(data) {
        document.getElementById("count").textContent = data.count || 0;
        document.getElementById("lastUpdate").textContent = data.lastUpdate || "-";
    }).catch(function(){});
    </script>

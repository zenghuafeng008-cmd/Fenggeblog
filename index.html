<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="凤鸽博客 - AI科技资讯与工具教程，每日更新">
    <meta name="keywords" content="AI, 科技, 教程, 工具, 博客">
    
    <!-- Open Graph -->
    <meta property="og:title" content="凤鸽博客 - AI科技资讯">
    <meta property="og:description" content="每日更新AI科技资讯、工具评测与教程">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://0746.qzz.cn">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="凤鸽博客 - AI科技资讯">
    
    <title>凤鸽博客 - AI科技资讯</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "凤鸽博客",
        "url": "https://0746.qzz.cn",
        "description": "AI科技资讯与工具教程",
        "publisher": {
            "@type": "Organization",
            "name": "凤鸽博客"
        }
    }
    </script>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <h1>凤鸽博客</h1>
        <p>聚焦AI科技资讯 | 工具评测与教程 | 每日更新</p>
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="article-count">--</div>
                <div class="stat-label">文章总数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="update-date">--</div>
                <div class="stat-label">最后更新</div>
            </div>
        </div>
    </section>
    
    <main class="home-container">
        <!-- Category Navigation -->
        <nav class="category-nav">
            <button class="category-btn active" data-category="all">全部</button>
            <button class="category-btn" data-category="AI资讯">AI资讯</button>
            <button class="category-btn" data-category="AI工具">AI工具</button>
            <button class="category-btn" data-category="AI评测">AI评测</button>
            <button class="category-btn" data-category="本地部署">本地部署</button>
            <button class="category-btn" data-category="工具教程">工具教程</button>
        </nav>
        
        <!-- Article Grid -->
        <div class="article-grid" id="article-grid">
            {{articles}}
        </div>
        
        <!-- Load More -->
        <div class="load-more">
            <button class="load-more-btn" id="load-more">加载更多</button>
        </div>
    </main>
    
    <script>
    // Category filter
    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelector('.category-btn.active').classList.remove('active');
            btn.classList.add('active');
            const category = btn.dataset.category;
            // Filter articles (implementation depends on data source)
        });
    });
    
    // Stats
    fetch('/stats.json')
        .then(r => r.json())
        .then(data => {
            document.getElementById('article-count').textContent = data.count || 0;
            document.getElementById('update-date').textContent = data.lastUpdate || '-';
        })
        .catch(() => {});
    </script>
</body>
</html>
